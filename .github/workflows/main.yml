name: Build Flutter App

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - name: Get Flutter dependencies
        working-directory: mobile-flutter
        run: flutter pub get
      - name: Build APK
        working-directory: mobile-flutter
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile-flutter/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - name: Get Flutter dependencies
        working-directory: mobile-flutter
        run: flutter pub get
      - name: Build IPA
        working-directory: mobile-flutter
        run: flutter build ipa --release
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: mobile-flutter/build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app.ipa
